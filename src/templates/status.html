{% extends "base.html" %}
{% block title %}Analyzing… — LearnFromOops{% endblock %}
{% block content %}
<h1>Analyzing your mistake…</h1>
<div class="thinking" id="thinking">
  <span class="spinner" aria-hidden="true"></span>
  <span id="status-text">Waiting for the worker to pick this up.</span>
</div>
<div class="error" id="error-box" hidden></div>
<p class="meta">You can leave this page open — it will redirect once the analysis is ready.</p>
<script>
  (function () {
    var jobId = {{ job_id|tojson }};
    var statusText = document.getElementById("status-text");
    var thinking = document.getElementById("thinking");
    var errorBox = document.getElementById("error-box");

    function showError(msg) {
      thinking.hidden = true;
      errorBox.hidden = false;
      errorBox.textContent = msg;
    }

    function poll() {
      fetch("/status/" + encodeURIComponent(jobId) + "/check")
        .then(function (r) { return r.json(); })
        .then(function (data) {
          if (data.state === "done") {
            window.location.replace("/mistake/" + data.category_slug + "/" + jobId);
            return;
          }
          if (data.state === "failed") {
            showError("Analysis failed after retries: " + (data.error || "unknown error") + ". Please try uploading again.");
            return;
          }
          if (data.state === "unknown") {
            showError("Job not found. It may have been cleaned up.");
            return;
          }
          if (data.state === "processing") {
            statusText.textContent = "Gemini is reading the image…";
          } else {
            statusText.textContent = "Queued — waiting for the worker (runs every minute).";
          }
          setTimeout(poll, 2000);
        })
        .catch(function () { setTimeout(poll, 4000); });
    }
    poll();
  })();
</script>
{% endblock %}
