{% extends "base.html" %}
{% block title %}New Mistake — LearnFromOops{% endblock %}
{% block content %}
<h1>New Mistake</h1>
<p>Upload a photo of the problem with the wrong answer. The AI will read it, classify it, and show the correct solution.</p>
{% if error %}<div class="error">{{ error }}</div>{% endif %}
<form method="POST" enctype="multipart/form-data" class="upload-form">
  <input type="file" name="image" accept="image/*" capture="environment" required>
  <button type="submit">Analyze</button>
</form>
{% endblock %}
